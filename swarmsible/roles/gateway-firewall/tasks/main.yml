- name: Allow openvpn connections via ipv4
  ufw:
    rule: allow
    proto: udp
    port: "1194"
    src: "0.0.0.0/0"
    to: "{{ ansible_host }}"
    comment: "openvpn"

- name: Allow routed traffic between internal networks via ipv4
  ufw:
    rule: allow
    route: true
    src: 10.0.0.0/8
    dest: 10.0.0.0/8
    comment: "allow routed traffic between internal networks"