---
- hosts:
  - docker_swarm_manager
  - docker_swarm_worker
  become: true
  vars:
    ansible_ssh_private_key_file: "{{ global_ansible_ssh_private_key_file | default((project_base_dir | default(playbook_dir)) + '/ssh_keys/ansible_rsa') }}"
    ansible_user: "{{ global_ansible_user | default('ansible') }}"
  roles:
    # copy the ssl certs from the beginning so all nodes have the certs on the system
    # so all mounts work
    - role: docker-swarm-hetzner-init-variables
    - role: copy-ssl-certs
    - role: docker-sysctl-tune
    - role: docker-pre-setup
    - role: docker-setup
    - role: docker-post-setup
    - role: docker-login
    - role: ufw-docker-install
      when: docker_swarm_use_ufw_docker | default(true) | bool
    - role: docker-swarm-firewall
    - role: docker-swarm-hosts
    - role: docker-swarm-routes

- hosts:
  - docker_swarm_manager
  become: true
  vars:
    ansible_ssh_private_key_file: "{{ global_ansible_ssh_private_key_file | default((project_base_dir | default(playbook_dir)) + '/ssh_keys/ansible_rsa') }}"
    ansible_user: "{{ global_ansible_user | default('ansible') }}"
  roles:
    - role: docker-swarm-hetzner-init-variables
    - role: docker-swarm-init
    - role: docker-swarm-add-manager

- hosts:
  - docker_swarm_worker
  become: true
  vars:
    ansible_ssh_private_key_file: "{{ global_ansible_ssh_private_key_file | default((project_base_dir | default(playbook_dir)) + '/ssh_keys/ansible_rsa') }}"
    ansible_user: "{{ global_ansible_user | default('ansible') }}"
  roles:
    - role: docker-swarm-hetzner-init-variables
    - role: docker-swarm-add-worker

- hosts:
  - docker_swarm_manager
  - docker_swarm_worker
  become: true
  vars:
    ansible_ssh_private_key_file: "{{ global_ansible_ssh_private_key_file | default((project_base_dir | default(playbook_dir)) + '/ssh_keys/ansible_rsa') }}"
    ansible_user: "{{ global_ansible_user | default('ansible') }}"
  roles:
    - role: docker-swarm-hetzner-init-variables
    - role: docker-swarm-labels